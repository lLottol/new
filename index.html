<head>

<!-- PWA service worker registration -->
<script>
(function() {
  // Generate icon as canvas for apple-touch-icon
  function makeIcon(size) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#0d2a14';
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = '#3a8c2f';
    ctx.fillRect(0, 0, size, size * 0.08);
    ctx.fillRect(0, size * 0.92, size, size * 0.08);
    ctx.beginPath();
    ctx.arc(size/2, size/2, size * 0.38, 0, Math.PI*2);
    ctx.fillStyle = '#3a8c2f';
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${size * 0.22}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('SST', size/2, size/2 - size*0.05);
    ctx.font = `bold ${size * 0.1}px Arial`;
    ctx.fillText('CAMPOS', size/2, size/2 + size*0.12);
    return c.toDataURL('image/png');
  }

  // Apple touch icon
  const link = document.createElement('link');
  link.rel = 'apple-touch-icon';
  link.href = makeIcon(192);
  document.head.appendChild(link);

  // Register real service worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js', { scope: '/' })
        .then(reg => console.log('SW registered', reg.scope))
        .catch(err => console.warn('SW error', err));
    });
  }
})();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a1a0e;
    --surface: #112318;
    --surface2: #1a3322;
    --border: #244d30;
    --accent: #3a8c2f;
    --accent-light: #5cb84d;
    --accent-bright: #7ed654;
    --text: #e6f0e8;
    --muted: #6a9070;
    --green: #5cb84d;
    --red: #e84040;
    --blue: #4a90e2;
    --header-h: 64px;
    --filter-h: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d2a14 0%, #1a4a22 50%, #0d2a14 100%);
    border-bottom: 3px solid var(--accent-light);
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: var(--header-h);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo img {
    height: 44px;
    width: auto;
    object-fit: contain;
    mix-blend-mode: lighten;
  }

  .logo-subtitle {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent-bright);
    opacity: 0.9;
    line-height: 1;
    padding-left: 12px;
    border-left: 1px solid rgba(94,184,77,0.35);
  }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .cart-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 9px 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: background 0.2s;
    min-height: 44px;
  }
  .cart-btn:active { background: var(--accent-light); }

  .cart-label { display: none; }

  .cart-badge {
    background: var(--red);
    color: white;
    border-radius: 50%;
    min-width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    padding: 0 3px;
  }

  /* ── MOBILE FILTER BAR (hidden on desktop) ── */
  .mobile-filter-bar {
    display: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
    gap: 8px;
    position: sticky;
    top: var(--header-h);
    z-index: 90;
    align-items: center;
  }

  .mobile-search-wrap { position: relative; flex: 1; }

  .mobile-search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px 10px 36px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; /* prevents iOS zoom */
    outline: none;
    height: 44px;
  }
  .mobile-search-wrap input:focus { border-color: var(--accent); }
  .mobile-search-wrap input::placeholder { color: var(--muted); }
  .msearch-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); }

  .filter-toggle-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 0 14px;
    height: 44px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .filter-toggle-btn.has-filter { border-color: var(--accent); color: var(--accent); }

  /* ── MOBILE FILTER SHEET ── */
  .filter-sheet {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    border-top: 2px solid var(--accent-light);
    z-index: 300;
    padding: 0 20px 32px;
    max-height: 70vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .filter-sheet.open { transform: translateY(0); }

  .filter-sheet-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 16px;
  }

  .filter-sheet h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .sheet-pills {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .sheet-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: var(--text);
    min-height: 48px;
  }
  .sheet-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .sheet-pill-count {
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 1px 8px;
    font-size: 11px;
  }
  .sheet-pill.active .sheet-pill-count { background: rgba(0,0,0,0.2); }

  /* ── DESKTOP LAYOUT ── */
  .app-layout {
    display: flex;
    height: calc(100vh - var(--header-h));
  }

  /* SIDEBAR (desktop only) */
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--muted);
  }

  .search-wrap { position: relative; }

  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px 10px 38px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted); font-size: 16px;
  }

  .filter-label {
    font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin-bottom: 6px;
  }

  .filter-pills { display: flex; flex-direction: column; gap: 6px; }

  .pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: var(--text);
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .pill-count { background: rgba(255,255,255,0.15); border-radius: 20px; padding: 1px 8px; font-size: 11px; }
  .pill.active .pill-count { background: rgba(0,0,0,0.2); }

  .cat-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }

  /* ── MAIN ── */
  .main-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  .results-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }

  .results-count { font-size: 13px; color: var(--muted); }
  .results-count strong { color: var(--text); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }

  /* ── SIGN CARD ── */
  .sign-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .sign-card:active { transform: scale(0.97); }
  .sign-card.in-cart { border-color: var(--green); }
  .sign-card.in-cart::after {
    content: '✓';
    position: absolute; top: 8px; right: 8px;
    width: 24px; height: 24px;
    background: var(--green); border-radius: 50%;
    font-size: 13px; font-weight: 700; color: white;
    line-height: 24px; text-align: center;
  }

  .card-img-wrap {
    background: #fff;
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 10px;
  }
  .card-img-wrap img { width: 100%; height: 100%; object-fit: contain; }

  .card-body { padding: 8px 10px 10px; }
  .card-num { font-size: 10px; color: var(--muted); font-weight: 500; margin-bottom: 2px; }
  .card-name { font-size: 11px; font-weight: 600; line-height: 1.3; color: var(--text); }

  .card-cat {
    font-size: 9px; margin-top: 5px;
    padding: 2px 7px; border-radius: 20px;
    display: inline-block; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  .add-btn {
    width: 100%; margin-top: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 7px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    min-height: 36px;
  }
  .add-btn:active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .add-btn.remove { background: rgba(231,76,60,0.15); border-color: var(--red); color: var(--red); }
  .add-btn.remove:active { background: var(--red); color: white; }

  /* ── CART PANEL ── */
  .cart-panel {
    position: fixed;
    top: 0; right: 0;
    width: min(420px, 100vw);
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 200;
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    box-shadow: -8px 0 40px rgba(0,0,0,0.5);
  }
  .cart-panel.open { transform: translateX(0); }

  .cart-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(135deg, #0d2a14, #1a4a22);
  }
  .cart-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--accent-bright); }

  .close-cart {
    background: none; border: none;
    color: var(--muted); font-size: 28px;
    cursor: pointer; line-height: 1;
    padding: 4px 8px; min-width: 44px; min-height: 44px;
    display: flex; align-items: center; justify-content: center;
  }

  .cart-items {
    flex: 1; overflow-y: auto;
    padding: 12px; display: flex; flex-direction: column; gap: 10px;
    -webkit-overflow-scrolling: touch;
  }

  .cart-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    display: flex; align-items: center; gap: 10px;
  }

  .cart-item-img {
    width: 52px; height: 52px;
    background: white; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; padding: 4px;
  }
  .cart-item-img img { width: 100%; height: 100%; object-fit: contain; }

  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name {
    font-size: 11px; font-weight: 600; line-height: 1.3; color: var(--text);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .cart-item-num { font-size: 10px; color: var(--muted); }

  .qty-controls { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }

  .qty-btn {
    width: 36px; height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text); border-radius: 8px;
    font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; line-height: 1;
    transition: background 0.15s;
  }
  .qty-btn:active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .qty-input {
    width: 42px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text); text-align: center;
    border-radius: 6px; padding: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 700; outline: none;
    height: 36px;
  }
  .qty-input:focus { border-color: var(--accent); }

  .remove-item {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 20px; flex-shrink: 0;
    min-width: 36px; min-height: 36px;
    display: flex; align-items: center; justify-content: center;
  }
  .remove-item:active { color: var(--red); }

  .cart-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 10px;
  }

  .cart-summary { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); }
  .cart-summary strong { color: var(--accent); font-size: 17px; }

  .export-btn {
    background: var(--accent); color: #fff; border: none;
    padding: 15px; border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 2px;
    cursor: pointer; transition: background 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    min-height: 52px;
  }
  .export-btn:active { background: var(--accent-light); }

  .clear-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 12px; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    cursor: pointer; transition: all 0.15s; min-height: 44px;
  }
  .clear-btn:active { border-color: var(--red); color: var(--red); }

  .empty-cart { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); gap: 12px; }
  .empty-cart .icon { font-size: 48px; opacity: 0.4; }
  .empty-cart p { font-size: 14px; text-align: center; }

  /* ── OVERLAY ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 150;
    backdrop-filter: blur(2px);
  }
  .overlay.open { display: block; }

  /* ── SHEET OVERLAY ── */
  .sheet-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 250;
  }
  .sheet-overlay.open { display: block; }

  /* Category colors */
  .cat-Prohibición { background: rgba(232,64,64,0.15); color: #e84040; }
  .cat-Obligación  { background: rgba(74,144,226,0.15); color: #4a90e2; }
  .cat-Advertencia { background: rgba(245,166,35,0.15); color: #f5a623; }
  .cat-Emergencia  { background: rgba(46,204,113,0.15); color: #2ecc71; }
  .cat-Información { background: rgba(180,180,180,0.15); color: #aaa; }

  .dot-Prohibición { background: #e84040; }
  .dot-Obligación  { background: #4a90e2; }
  .dot-Advertencia { background: #f5a623; }
  .dot-Emergencia  { background: #2ecc71; }
  .dot-Información { background: #aaa; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--accent-light); color: var(--accent-bright);
    padding: 12px 22px; border-radius: 10px;
    font-size: 13px; font-weight: 600;
    z-index: 9999; transition: transform 0.3s; white-space: nowrap;
    max-width: calc(100vw - 32px); text-align: center;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Generating overlay */
  .gen-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); z-index: 999;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px; letter-spacing: 3px; color: var(--accent-bright);
  }
  .gen-overlay.show { display: flex; }

  .spinner {
    width: 48px; height: 48px;
    border: 4px solid var(--border);
    border-top-color: var(--accent-light);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .no-results { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); }
  .no-results .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }

  /* ── RESPONSIVE: MOBILE ── */
  @media (max-width: 640px) {
    .sidebar { display: none; }
    .mobile-filter-bar { display: flex; }
    .cart-label { display: inline; }

    .app-layout { height: calc(100vh - var(--header-h) - var(--filter-h)); }

    .main-area { padding: 12px; }

    .grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .sign-card { border-radius: 10px; }
    .card-body { padding: 7px 8px 9px; }
    .card-name { font-size: 10px; }
    .add-btn { font-size: 11px; padding: 10px 6px; }

    /* Cart full screen on mobile */
    .cart-panel {
      width: 100vw;
      border-left: none;
      border-top: 2px solid var(--accent);
    }

    /* Filter sheet */
    .filter-sheet { display: block; }

    .results-bar { margin-bottom: 10px; }
  }

  @media (min-width: 641px) {
    .cart-label { display: inline; }
    .add-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
    .add-btn.remove:hover { background: var(--red); color: white; }
    .qty-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
    .sign-card:hover { border-color: var(--accent-light); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
    .cart-btn:hover { background: var(--accent-light); }
    .export-btn:hover { background: var(--accent-light); }
    .pill:hover { border-color: var(--accent-light); color: var(--accent-bright); }
  }

</style>
</head>
<body>

  </div>
  <div class="header-right">
    <button class="cart-btn" onclick="toggleCart()">
      🛒 <span class="cart-label">Mi Selección</span>
      <span class="cart-badge" id="cart-badge">0</span>
    </button>
  </div>
</header>

<!-- Mobile filter bar (visible only on mobile) -->
<div class="mobile-filter-bar" id="mobile-filter-bar">
  <div class="mobile-search-wrap">
    <span class="msearch-icon">🔍</span>
    <input type="text" id="mobile-search" placeholder="Buscar señal..." oninput="onMobileSearch()" autocomplete="off">
  </div>
  <button class="filter-toggle-btn" id="filter-toggle-btn" onclick="openFilterSheet()">
    ☰ <span id="filter-btn-label">Filtrar</span>
  </button>
</div>

<div class="app-layout">
  <aside class="sidebar">
    <h3>Filtros</h3>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="search" placeholder="Buscar señal..." oninput="renderGrid()">
    </div>
    <div>
      <div class="filter-label">Categoría</div>
      <div class="filter-pills" id="cat-pills"></div>
    </div>
  </aside>

  <main class="main-area">
    <div class="results-bar">
      <div class="results-count" id="results-count"></div>
    </div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<!-- Overlay (cart) -->
<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<!-- Sheet overlay (filters) -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeFilterSheet()"></div>

<!-- Filter Sheet (mobile) -->
<div class="filter-sheet" id="filter-sheet">
  <div class="filter-sheet-handle"></div>
  <h3>Categoría</h3>
  <div class="sheet-pills" id="sheet-pills"></div>
</div>

<!-- Cart Panel -->
<div class="cart-panel" id="cart-panel">
  <div class="cart-header">
    <h2>Mi Selección</h2>
    <button class="close-cart" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer" id="cart-footer"></div>
</div>


<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Generating overlay -->
<div class="gen-overlay" id="gen-overlay">
  <div class="spinner"></div>
  GENERANDO PDF...
</div>

<script>
async function initApp() {
  // Carga la base de datos desde signs.json
  let SIGNS;
  try {
    const res = await fetch('/signs.json');
    if (!res.ok) throw new Error('No se pudo cargar signs.json');
    const raw = await res.json();
    // Cargar imágenes como base64 para compatibilidad con jsPDF
    SIGNS = await Promise.all(raw.map(async s => {
      try {
        const imgRes = await fetch('/' + s.file);
        const blob = await imgRes.blob();
        const b64 = await new Promise(resolve => {
          const reader = new FileReader();
          reader.onloadend = () => resolve(reader.result.split(',')[1]);
          reader.readAsDataURL(blob);
        });
        return { ...s, mime: 'image/png', data: b64 };
      } catch(e) {
        console.warn('No se pudo cargar imagen:', s.file);
        return { ...s, mime: 'image/png', data: '' };
      }
    }));
  } catch(e) {
    document.getElementById('grid').innerHTML = `<div class="no-results"><div class="icon">⚠️</div><p>Error cargando la base de datos.<br>${e.message}</p></div>`;
    return;
  }

let cart = {};
let activeCategory = 'Todas';

const categories = ['Todas', ...new Set(SIGNS.map(s => s.category))];
const catCounts = {};
SIGNS.forEach(s => { catCounts[s.category] = (catCounts[s.category]||0)+1; });

// Build category pills (desktop sidebar)
const pillsEl = document.getElementById('cat-pills');
categories.forEach(cat => {
  const pill = document.createElement('div');
  pill.className = 'pill' + (cat === 'Todas' ? ' active' : '');
  const count = cat === 'Todas' ? SIGNS.length : catCounts[cat]||0;
  const dot = cat !== 'Todas' ? `<span class="cat-dot dot-${cat}"></span>` : '';
  pill.innerHTML = `<span>${dot}${cat}</span><span class="pill-count">${count}</span>`;
  pill.onclick = () => {
    activeCategory = cat;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    syncMobileFilter();
    renderGrid();
  };
  pillsEl.appendChild(pill);
});

// Build category pills (mobile sheet)
const sheetPillsEl = document.getElementById('sheet-pills');
categories.forEach(cat => {
  const pill = document.createElement('div');
  pill.className = 'sheet-pill' + (cat === 'Todas' ? ' active' : '');
  const count = cat === 'Todas' ? SIGNS.length : catCounts[cat]||0;
  const dot = cat !== 'Todas' ? `<span class="cat-dot dot-${cat}" style="margin-right:6px"></span>` : '';
  pill.innerHTML = `<span>${dot}${cat}</span><span class="sheet-pill-count">${count}</span>`;
  pill.onclick = () => {
    activeCategory = cat;
    document.querySelectorAll('.sheet-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    syncDesktopFilter();
    updateFilterBtn();
    renderGrid();
    closeFilterSheet();
  };
  sheetPillsEl.appendChild(pill);
});

function syncMobileFilter() {
  document.querySelectorAll('.sheet-pill').forEach((p, i) => {
    p.classList.toggle('active', categories[i] === activeCategory);
  });
  updateFilterBtn();
}

function syncDesktopFilter() {
  document.querySelectorAll('.pill').forEach((p, i) => {
    p.classList.toggle('active', categories[i] === activeCategory);
  });
}

function updateFilterBtn() {
  const btn = document.getElementById('filter-toggle-btn');
  const label = document.getElementById('filter-btn-label');
  if (activeCategory !== 'Todas') {
    btn.classList.add('has-filter');
    label.textContent = activeCategory;
  } else {
    btn.classList.remove('has-filter');
    label.textContent = 'Filtrar';
  }
}

function onMobileSearch() {
  // Sync mobile search to desktop search so getFiltered() works
  const val = document.getElementById('mobile-search').value;
  document.getElementById('search').value = val;
  renderGrid();
}

function openFilterSheet() {
  document.getElementById('filter-sheet').classList.add('open');
  document.getElementById('sheet-overlay').classList.add('open');
}

function closeFilterSheet() {
  document.getElementById('filter-sheet').classList.remove('open');
  document.getElementById('sheet-overlay').classList.remove('open');
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  return SIGNS.filter(s => {
    const matchCat = activeCategory === 'Todas' || s.category === activeCategory;
    const matchQ = !q || s.name.toLowerCase().includes(q) || String(s.id).includes(q);
    return matchCat && matchQ;
  });
}

function renderGrid() {
  const filtered = getFiltered();
  const grid = document.getElementById('grid');
  document.getElementById('results-count').innerHTML = `Mostrando <strong>${filtered.length}</strong> de ${SIGNS.length} señales`;

  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results"><div class="icon">🔎</div><p>No se encontraron señales con ese criterio.</p></div>';
    return;
  }

  grid.innerHTML = filtered.map(s => {
    const inCart = !!cart[s.id];
    return `
    <div class="sign-card ${inCart ? 'in-cart' : ''}" id="card-${s.id}">
      <div class="card-img-wrap">
        <img src="data:${s.mime};base64,${s.data}" alt="${s.name}" loading="lazy">
      </div>
      <div class="card-body">
        <div class="card-num">#${s.id}</div>
        <div class="card-name">${s.name}</div>
        <div class="card-cat cat-${s.category}">${s.category}</div>
        <button class="add-btn ${inCart ? 'remove' : ''}" onclick="toggleCart_item(${s.id})">
          ${inCart ? '✕ Quitar' : '+ Añadir'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function toggleCart_item(id) {
  const sign = SIGNS.find(s => s.id === id);
  if (cart[id]) {
    delete cart[id];
    showToast(`"${sign.name}" eliminado`);
  } else {
    cart[id] = { sign, qty: 1 };
    showToast(`"${sign.name}" añadido ✓`);
  }
  updateCartBadge();
  renderCart();
  // Update card
  const card = document.getElementById('card-' + id);
  if (card) {
    card.className = 'sign-card' + (cart[id] ? ' in-cart' : '');
    const btn = card.querySelector('.add-btn');
    if (btn) {
      btn.className = 'add-btn' + (cart[id] ? ' remove' : '');
      btn.textContent = cart[id] ? '✕ Quitar' : '+ Añadir';
    }
  }
}

function updateCartBadge() {
  const total = Object.keys(cart).length;
  document.getElementById('cart-badge').textContent = total;
}

function renderCart() {
  const items = Object.values(cart);
  const cartItemsEl = document.getElementById('cart-items');
  const cartFooter = document.getElementById('cart-footer');

  if (!items.length) {
    cartItemsEl.innerHTML = `
      <div class="empty-cart">
        <div class="icon">📋</div>
        <p>Tu selección está vacía.<br>Añade señales desde el catálogo.</p>
      </div>`;
    cartFooter.innerHTML = '';
    return;
  }

  cartItemsEl.innerHTML = items.map(item => `
    <div class="cart-item" id="cart-item-${item.sign.id}">
      <div class="cart-item-img">
        <img src="data:${item.sign.mime};base64,${item.sign.data}" alt="${item.sign.name}">
      </div>
      <div class="cart-item-info">
        <div class="cart-item-num">#${item.sign.id}</div>
        <div class="cart-item-name">${item.sign.name}</div>
      </div>
      <div class="qty-controls">
        <button class="qty-btn" onclick="changeQty(${item.sign.id}, -1)">−</button>
        <input class="qty-input" type="number" min="1" max="999" value="${item.qty}" 
               onchange="setQty(${item.sign.id}, this.value)">
        <button class="qty-btn" onclick="changeQty(${item.sign.id}, 1)">+</button>
      </div>
      <button class="remove-item" onclick="removeFromCart(${item.sign.id})" title="Eliminar">🗑</button>
    </div>
  `).join('');

  const totalUnits = items.reduce((a,b) => a+b.qty, 0);

  cartFooter.innerHTML = `
    <div class="cart-summary">
      <span>${items.length} tipo(s) de señal</span>
      <span>Total unidades: <strong>${totalUnits}</strong></span>
    </div>
    <button class="export-btn" onclick="exportPDF()">
      📄 EXPORTAR PDF
    </button>
    <button class="clear-btn" onclick="clearCart()">Limpiar selección</button>
  `;
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty = Math.max(1, cart[id].qty + delta);
  renderCart();
}

function setQty(id, val) {
  if (!cart[id]) return;
  const n = parseInt(val);
  cart[id].qty = isNaN(n) || n < 1 ? 1 : Math.min(999, n);
  renderCart();
}

function removeFromCart(id) {
  delete cart[id];
  updateCartBadge();
  renderCart();
  renderGrid();
}

function clearCart() {
  cart = {};
  updateCartBadge();
  renderCart();
  renderGrid();
}

function toggleCart() {
  document.getElementById('cart-panel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

async function exportPDF() {
  const items = Object.values(cart);
  if (!items.length) return;

  document.getElementById('gen-overlay').classList.add('show');
  await new Promise(r => setTimeout(r, 50));

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    const PW = 210, PH = 297;

    // Expand items by qty: each copy = one full page
    const pages = [];
    items.forEach(item => {
      for (let c = 0; c < item.qty; c++) pages.push(item.sign);
    });

    pages.forEach((sign, idx) => {
      if (idx > 0) doc.addPage();
      try {
        const fmt = sign.mime === 'image/png' ? 'PNG' : 'JPEG';
        doc.addImage('data:' + sign.mime + ';base64,' + sign.data, fmt, 0, 0, PW, PH);
      } catch(e) { console.warn('img err', e); }
    });

    doc.save('señaleticas-SST-imprimir.pdf');
    showToast(`✓ PDF listo: ${pages.length} página(s) para imprimir`);
  } catch(e) {
    console.error(e);
    alert('Error al generar PDF: ' + e.message);
  }

  document.getElementById('gen-overlay').classList.remove('show');
}

// Init
renderGrid();
renderCart();
}

initApp();
</script>
</body>
</html>
